# https://gohugo.io/getting-started/configuration/#configure-server
# headers must be the same than in netlify.toml
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "no-referrer"
Permissions-Policy = """
    geolocation=(),
    midi=(),
    sync-xhr=(),
    microphone=(),
    camera=(),
    magnetometer=(),
    gyroscope=(),
    fullscreen=(self),
    interest-cohort=()
"""
# "connect-src https://d4twhgtvn0ff5.cloudfront.net/" for stats graphs
# "img-src data: blob:" is for Plotly download feature
# "script-src unsafe-eval unsafe-inline data:": For Google Analytics
# "form-action" is NOT set, so it allows everything (it doesn't default to default-src). If restricted, It must allow at least www.paypal.com and its redirects
Content-Security-Policy = """
    default-src 'none';
    font-src 'self'
        https://doublethedonation.com
        https://rsms.me
        http://rsms.me
    ;
    style-src 'self' 'unsafe-inline'
        https://donorbox.org
        https://doublethedonation.com
        https://rsms.me
        http://rsms.me
    ;
    script-src 'unsafe-eval' 'unsafe-inline' 'self' data:
        https://www.google-analytics.com
        https://www.googleadservices.com
        https://www.googletagmanager.com
        https://cdn.jsdelivr.net
        http://cdn.jsdelivr.net
        https://googleads.g.doubleclick.net
        https://donorbox.org
        https://doublethedonation.com
        https://js.stripe.com
        https://jspm.dev
        https://js.stripe.com/v3/
        https://sdks.shopifycdn.com
        https://www.paypal.com
        https://www.paypalobjects.com
        https://widget.thegivingblock.com
        https://*.shift4.com
    ;
    img-src 'self' data: blob:
        https://www.google-analytics.com
        https://donorbox.org
        https://doublethedonation.com
        https://*.paypal.com
        https://www.paypalobjects.com
        https://ak2s.abmr.net
        https://ak1s.abmr.net
        https://www.google.com
        https://cdn.shopify.com
        https://v.shopify.com
    ;
    frame-src
        https://donorbox.org
        https://www.youtube.com
        https://www.youtube-nocookie.com
        https://bid.g.doubleclick.net
        https://js.stripe.com/v3/
        https://js.stripe.com/v2/
        https://www.paypal.com
        https://outreach.abetterinternet.org
        https://app.netlify.com
        https://widget.thegivingblock.com/
    ;
    connect-src 'self'
        https://d4twhgtvn0ff5.cloudfront.net/
        https://donorbox.org
        https://doublethedonation.com
        https://letsencrypt-merch.myshopify.com
        https://monorail-edge.shopifysvc.com
        https://www.paypal.com
        https://www.google-analytics.com
    ;
    frame-ancestors 'none';
"""

[[headers]]
for = "/repository"
[headers.values]
# For WebTrust Audits
# Cf https://github.com/letsencrypt/website/pull/976
Referrer-Policy = "strict-origin"

[[headers]]
for = "/:lang/repository"
[headers.values]
# For WebTrust Audits
# Cf https://github.com/letsencrypt/website/pull/976
Referrer-Policy = "strict-origin"

[[headers]]
for = "/2017/10/17/acme-support-in-apache-httpd"
[headers.values]
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/2017/10/17/acme-support-in-apache-httpd/"
[headers.values]
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/certs/*.pem"
[headers.values]
# Because Netlify defaults to "application/x-x509-ca-cert", which is for DER.
Content-Type = "application/x-pem-file"
Content-Disposition = "inline"
