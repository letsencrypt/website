[donate_2026_planned_legacy_giving_text]
other = "Zvažte prosím, zda ISRG neuvedete jako příjemce odkazu ze závěti nebo penzijního plánu. Pomůžete tak chránit uživatele internetu snižováním finančních, technologických a informačních překážek bránících bezpečnějšímu internetu, který respektuje soukromí."

[donate_2026_planned_legacy_giving_notify_text]
other = "Už jste ISRG zahrnuli do svého dědického plánování? {{ .legacyGivingFormLink }}."

[donate_2026_planned_legacy_giving_confidentiality_text]
other = "Informace o plánovaném daru zůstávají důvěrné a nejsou právně závazné. Umožní nám však plánovat budoucnost a poděkovat vám za vaši štědrost již dnes."

