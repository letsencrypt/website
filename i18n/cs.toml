[donate_2026_qualified_charitable_distribution_title]
other = "Kvalifikovaná charitativní distribuce"

[donate_2026_qualified_charitable_distribution_text]
other = "Pokud je vám 70½ nebo více, můžete darovat přímo ze svého účtu IRA vedeného v USA organizaci ISRG, aniž byste z převedené částky platili daň z příjmu. Tato možnost se často označuje jako charitativní převod z IRA nebo kvalifikovaná charitativní distribuce (QCD). Darovat můžete až do ročního maxima stanoveného úřadem IRS, které se každý rok upravuje. Aktuální částku si proto ověřte u svého poradce."

[donate_2026_qualified_charitable_distribution_advisor_text]
other = "Poraďte se prosím se svým finančním nebo právním poradcem."

[donate_2026_qualified_charitable_distribution_instructions_text]
other = "Chcete-li dar uskutečnit, požádejte správce svého účtu IRA, aby částku poslal přímo organizaci ISRG. Sdělte mu náš právní název a federální daňové identifikační číslo, aby nás mohl identifikovat. Dejte nám prosím o svém daru také vědět. Mnozí správci účtů IRA posílají dary bez identifikace dárce, takže krátká zpráva od vás nám umožní poděkovat vám a respektovat vaše přání ohledně daru."

