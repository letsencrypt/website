[getting_started_description]
other = "Let's Encrypt là một Cơ quan Chứng nhận cung cấp chứng chỉ TLS miễn phí, giúp các trang web dễ dàng bật mã hóa HTTPS và tạo ra một Internet an toàn hơn cho mọi người. Let's Encrypt là một dự án của tổ chức phi lợi nhuận Internet Security Research Group (ISRG)."

